<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Coffee API Test</title>
    <style>
        body {
            font-family: Arial;
            margin: 40px;
            background: #f4f4f4;
            line-height: 1.6;
        }

        .card {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 6px;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.1);
        }

        h3 {
            margin-top: 0;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        input {
            padding: 8px;
            margin: 5px 0;
            display: block;
            width: 300px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            padding: 8px 15px;
            cursor: pointer;
            background: #444;
            color: white;
            border: none;
            border-radius: 4px;
            margin-top: 5px;
        }

        button:hover {
            background: #222;
        }

        pre {
            background: #222;
            color: #0f0;
            padding: 15px;
            overflow: auto;
            border-radius: 4px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

<h1>Coffee API Test</h1>

<div id="auth-section">
    <div class="card">
        <h3>Create User</h3>
        <input id="name" placeholder="Name">
        <input id="email" placeholder="Email">
        <input id="password" placeholder="Password" type="password">
        <button onclick="createUser()">Create</button>
    </div>

    <div class="card">
        <h3>Login</h3>
        <input id="loginEmail" placeholder="Email">
        <input id="loginPassword" placeholder="Password" type="password">
        <button onclick="login()">Login</button>
    </div>
</div>

<div id="user-section" class="hidden">
    <div class="card">
        <h3>Session</h3>
        <p>User Authenticated</p>
        <button onclick="logout()">Logout</button>
    </div>
</div>

<div class="card">
    <h3>Users Management</h3>
    <div style="display: flex; gap: 5px;">
        <button onclick="getUsers(1)">List Users Page 1</button>
        <button onclick="getUsers(2)">Page 2</button>
    </div>
    <div style="margin-top:15px">
        <input id="findId" placeholder="User ID">
        <button onclick="getUserById()">Find by ID</button>
    </div>
</div>

<div class="card">
    <h3>Edit / Delete User</h3>
    <input id="editId" placeholder="User ID" readonly style="background:#eee">
    <input id="editName" placeholder="New Name">
    <input id="editEmail" placeholder="New Email">
    <input id="editPassword" placeholder="New Password" type="password">
    <button onclick="updateUser()">Update User</button>
    <button onclick="deleteUser()">Delete User</button>
</div>

<div class="card">
    <h3>Drink Coffee</h3>
    <input id="drinkUserId" placeholder="User ID" readonly style="background:#eee">
    <input id="drinkQty" placeholder="Quantity (int)">
    <button onclick="drink()">Register Drink</button>
</div>

<div class="card">
    <h3>Reports & Ranking</h3>
    <button onclick="history()">My Daily History</button>
    <div style="margin-top:15px">
        <input id="rankDate" type="date">
        <button onclick="rankingDay()">Ranking by Day</button>
    </div>
    <div style="margin-top:15px">
        <input id="rankDays" placeholder="Last X Days" value="7">
        <button onclick="ranking()">Load Period Ranking</button>
    </div>
</div>

<h3>Response</h3>
<pre id="response">Waiting for action...</pre>

<script>
    const API = "http://localhost:8000";
    let token = "";
    let myId = "";

    function show(data) {
        document.getElementById("response").textContent = JSON.stringify(data, null, 2);
    }

    function updateUI(data = null) {
        document.getElementById("auth-section").classList.toggle("hidden", !!token);
        document.getElementById("user-section").classList.toggle("hidden", !token);
        
        if(token && data) {
            document.getElementById("editId").value = data.iduser;
            document.getElementById("drinkUserId").value = data.iduser;
            document.getElementById("editName").value = data.name;
            document.getElementById("editEmail").value = data.email;
        }
    }

    async function createUser() {
        const res = await fetch(API+"/users", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({
                name: document.getElementById("name").value,
                email: document.getElementById("email").value,
                password: document.getElementById("password").value
            })
        });
        show(await res.json());
    }

    async function login() {
        const res = await fetch(API+"/login", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({
                email: document.getElementById("loginEmail").value,
                password: document.getElementById("loginPassword").value
            })
        });
        const data = await res.json();
        if(data.token) {
            token = data.token;
            myId = data.iduser;
            updateUI(data);
        }
        show(data);
    }

    function logout() {
        token = ""; myId = ""; updateUI();
        document.getElementById("editId").value = "";
        document.getElementById("drinkUserId").value = "";
        document.getElementById("editName").value = "";
        document.getElementById("editEmail").value = "";
        show({message: "Logged out successfully"});
    }

    async function getUsers(page = 1) {
        const res = await fetch(API+"/users?page="+page, { headers:{"token":token} });
        show(await res.json());
    }

    async function getUserById() {
        const id = document.getElementById("findId").value;
        const res = await fetch(API+"/users/"+id, { headers:{"token":token} });
        show(await res.json());
    }

    async function updateUser() {
        const res = await fetch(API+"/users/"+myId, {
            method:"PUT",
            headers:{"Content-Type":"application/json", "token":token},
            body:JSON.stringify({
                name: document.getElementById("editName").value,
                email: document.getElementById("editEmail").value,
                password: document.getElementById("editPassword").value
            })
        });
        show(await res.json());
    }

    async function deleteUser() {
        const res = await fetch(API+"/users/"+myId, {
            method:"DELETE",
            headers:{"token":token}
        });
        const data = await res.json();
        show(data);
        if(res.ok) logout();
    }

    async function drink() {
        const res = await fetch(API+"/users/"+myId+"/drink", {
            method:"POST",
            headers:{"Content-Type":"application/json", "token":token},
            body:JSON.stringify({ drink: parseInt(document.getElementById("drinkQty").value) })
        });
        show(await res.json());
    }

    // AJUSTADO: Agora bate com a rota users/{id}/history do seu PHP
    async function history() {
        const res = await fetch(API+"/users/"+myId+"/history", { headers:{"token":token} });
        show(await res.json());
    }

    async function rankingDay() {
        const date = document.getElementById("rankDate").value;
        const res = await fetch(API+"/ranking/day/"+date, { headers:{"token":token} });
        show(await res.json());
    }

    async function ranking() {
        const days = document.getElementById("rankDays").value;
        const res = await fetch(API+"/ranking/days/"+days, { headers:{"token":token} });
        show(await res.json());
    }
</script>

</body>
</html>
